name: Validate skill

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate skill package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run repository checks
        run: bash scripts/validate-skill.sh

      - name: Build package smoke test
        run: bash scripts/package-skill.sh --version ci --output-dir /tmp/client-delivery-guardrails-dist
