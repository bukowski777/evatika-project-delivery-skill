name: Release package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build release archive
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate skill
        run: bash scripts/validate-skill.sh

      - name: Package skill
        run: bash scripts/package-skill.sh --version "${GITHUB_REF_NAME}"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/*.zip --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/*.zip \
              --title "${GITHUB_REF_NAME}" \
              --notes "Codex skill release ${GITHUB_REF_NAME}"
          fi
